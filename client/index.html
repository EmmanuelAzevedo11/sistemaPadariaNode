<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Padaria</title>
    <style>
        /* Reset de estilos básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fundo escuro idêntico ao da imagem */
        body {
            background-color: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container do formulário baseado no estilo dos cards da imagem */
        .login-container {
            background-color: #161b26;
            border: 1px solid #222b3c;
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Ícone do croissant simulado no topo do formulário */
        .logo-icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: inline-block;
        }

        /* Título em Laranja/Dourado seguindo a imagem */
        h2 {
            color: #ff9f1c;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* Subtítulo explicativo com cor suave */
        p.subtitle {
            color: #707e94;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Grupo de inputs */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        /* Estilização dos campos de texto (Dark Mode) */
        input {
            width: 100%;
            padding: 14px 16px;
            background-color: #0f131c;
            border: 1px solid #222b3c;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        /* Efeito de foco azulado sutil padrão do tema escuro */
        input:focus {
            outline: none;
            border-color: #ff9f1c;
            box-shadow: 0 0 8px rgba(255, 159, 28, 0.2);
        }

        /* Placeholder com a cor cinza discreta */
        input::placeholder {
            color: #4a5568;
        }

        /* Botão estilizado com o tom de destaque */
        button {
            width: 100%;
            padding: 14px;
            background-color: #ff9f1c;
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        /* Efeito hover do botão */
        button:hover {
            background-color: #e68a00;
        }

        /* Efeito de clique */
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <span class="logo-icon">🥐</span>
        
        <h2>Acesso ao Sistema</h2>
        <p class="subtitle">Insira suas credenciais para gerenciar a padaria</p>
        
        <form id="formLogin">

            <div class="input-group">
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            
            <button type="submit">Entrar no Sistema</button>
        </form>
    </div>

    <script src="src/api/login.js"></script>
</body>
</html>
